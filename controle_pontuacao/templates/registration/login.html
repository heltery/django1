{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    .login-wrap {
        min-height: calc(100vh - 140px);
        display: grid;
        place-items: center;
        padding: 24px 0;
    }

    .login-card {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 242, 0, .28);
        border-radius: 22px;
        background:
            radial-gradient(circle at 50% 0%, rgba(255, 242, 0, .16), transparent 38%),
            linear-gradient(180deg, #171717, #050505);
        box-shadow: 0 28px 80px rgba(0, 0, 0, .42);
        padding: 34px 42px 38px;
    }

    .login-logo {
        display: block;
        width: 118px;
        height: 118px;
        object-fit: contain;
        margin: 0 auto 14px;
        filter: drop-shadow(0 14px 22px rgba(255, 242, 0, .16));
    }

    .login-card h1 {
        margin: 0 0 24px;
        color: #fff200;
        text-align: center;
        font-size: 30px;
        font-weight: 950;
        letter-spacing: .04em;
    }

    .login-error {
        margin: 0 0 14px;
        color: #fecaca;
        text-align: center;
        font-weight: 800;
    }

    .login-form {
        display: grid;
        gap: 14px;
    }

    .login-form label {
        margin: 0 0 6px;
        color: #fff7ad;
        font-size: 13px;
        font-weight: 900;
    }

    .login-field {
        display: grid;
        gap: 6px;
    }

    .login-field input {
        width: 100%;
        margin: 0;
        border: 1px solid rgba(255, 242, 0, .30) !important;
        border-radius: 999px !important;
        background: #0b0b0b !important;
        color: #fffbe6 !important;
        padding: 13px 16px;
        font-weight: 800;
        box-shadow: none;
    }

    .login-field input::placeholder {
        color: rgba(214, 201, 140, .76);
    }

    .login-field input:focus {
        border-color: #fff200 !important;
        box-shadow: 0 0 0 4px rgba(255, 242, 0, .16);
    }

    .login-submit {
        width: 100%;
        margin-top: 8px;
        border-radius: 999px !important;
        background: linear-gradient(135deg, #e60000, #fff200) !important;
        color: #050505 !important;
        box-shadow: 0 14px 28px rgba(230, 0, 0, .22);
        text-transform: uppercase;
        letter-spacing: .04em;
    }

    @media (max-width: 520px) {
        .login-card {
            padding: 28px 22px 32px;
        }
    }
</style>

<section class="login-wrap">
    <div class="login-card">
        <img class="login-logo" src="{% static 'sistema/img/BRASAO_BPRONE_APENAS_FUNDO_CINZA_REMOVIDO.png' %}" alt="Brasao BPRone">
        <h1>Login</h1>

        {% if form.errors %}
            <p class="login-error">Usuario ou senha invalidos.</p>
        {% endif %}

        <form class="login-form" method="post">
            {% csrf_token %}

            <div class="login-field">
                <label for="{{ form.username.id_for_label }}">Usuario</label>
                {{ form.username }}
            </div>

            <div class="login-field">
                <label for="{{ form.password.id_for_label }}">Senha</label>
                {{ form.password }}
            </div>

            <button class="login-submit" type="submit">Entrar</button>
        </form>
    </div>
</section>

<script>
    (function () {
        var username = document.getElementById('{{ form.username.id_for_label }}');
        var password = document.getElementById('{{ form.password.id_for_label }}');
        if (username) {
            username.setAttribute('placeholder', 'Digite sua matricula');
        }
        if (password) {
            password.setAttribute('placeholder', 'Digite sua senha');
        }
    })();
</script>
{% endblock %}
