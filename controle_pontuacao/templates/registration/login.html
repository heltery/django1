{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="card">
    <h1>Entrar</h1>

    {% if form.errors %}
        <p class="error">Usuario ou senha invalidos.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="{{ form.username.id_for_label }}">Usuario</label>
        {{ form.username }}

        <label for="{{ form.password.id_for_label }}">Senha</label>
        {{ form.password }}

        <button type="submit">Entrar</button>
    </form>
</section>
{% endblock %}
